<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#f6efe5" />
    <meta name="color-scheme" content="light dark" />
    <meta name="application-name" content="InkyGallery" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="InkyGallery" />
    <meta name="description" content="InkyGallery — Manage your Inky e-ink display with a beautiful mobile interface" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <title>InkyGallery</title>
    <script>
      (() => {
        const storageKey = 'inkygallery-theme-preference';
        const root = document.documentElement;
        const themeMeta = document.querySelector('meta[name="theme-color"]');
        const stored = localStorage.getItem(storageKey);
        const preference =
          stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
        const resolved =
          preference === 'system'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : preference;

        root.dataset.themePreference = preference;
        root.classList.toggle('dark', resolved === 'dark');
        root.style.colorScheme = resolved;
        if (themeMeta) {
          themeMeta.setAttribute('content', resolved === 'dark' ? '#141417' : '#f6efe5');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
